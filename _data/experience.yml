- title: Bioinformatics Research Assistant
  university: Universidad de La Laguna, Spain
  from: SEP 2024
  to: JUL 2025
  description: Genomic data analysis of asthma patients and controls using RNA-seq and microarray data. Custom pipelines were developed in Bash and R to perform end-to-end data processing, including quality control, normalization, bias correction, and sex-stratified differential gene expression analysis to identify asthma-associated biomarkers. Separately, I worked on the processing and analysis of raw respiratory microbiome data, as well as blood epigenome data, using R to conduct microbiome epigenome-wide association studies to identify associations between microbiome features and epigenetic markers in asthma.

